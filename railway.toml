[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh /app/scripts/start.sh"

[[crons]]
name = "sync-draws"
schedule = "*/15 * * * *"
command = "curl -sf \"$NEXTAUTH_URL/api/cron/sync-draws?secret=$CRON_SECRET\" || true"

[[crons]]
name = "sync-results"
schedule = "0 5 * * 0,1,3,4,6"
command = "curl -sf -X POST \"$NEXTAUTH_URL/api/draws/sync-results\" -H \"Content-Type: application/json\" -d '{\"secret\":\"SYNC_RESULTS_2026\"}' || true"

[[crons]]
name = "daily-summary"
schedule = "0 14 * * *"
command = "curl -sf -H \"Authorization: Bearer $CRON_SECRET\" \"$NEXTAUTH_URL/api/admin/daily-summary\" || true"

[[crons]]
name = "cutoff-alert"
schedule = "*/30 * * * *"
command = "curl -sf \"$NEXTAUTH_URL/api/cron/cutoff-alert?secret=$CRON_SECRET\" || true"
